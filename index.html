<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CommiTrack: track, verify, and report your commissions clearly.">
  <meta name="theme-color" content="#279FD0">

  <meta property="og:title" content="CommiTrack">
  <meta property="og:description" content="Your commission, clear and without tricks.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://commitrack.com/bimi.svg">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CommiTrack">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <title>CommiTrack</title>

  <style>
    :root {
      --brand-a: #279fd0;
      --brand-b: #1bb4de;
      --ink: #113141;
      --muted: #56727f;
      --bg-a: #e8f6fd;
      --bg-b: #f9fdff;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at 10% -10%, #bde8f9 0, transparent 40%),
        linear-gradient(180deg, var(--bg-a), var(--bg-b));
      color: var(--ink);
    }

    #boot-splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 9999;
    }

    .boot-card {
      width: min(440px, calc(100% - 40px));
      background: #fff;
      border: 1px solid #d8e7ef;
      border-radius: 18px;
      box-shadow: 0 14px 40px rgba(13, 60, 82, 0.14);
      padding: 26px 24px;
      text-align: center;
    }

    .boot-logo {
      width: 120px;
      height: auto;
      margin-bottom: 10px;
    }

    .boot-title {
      margin: 0;
      font-size: 32px;
      line-height: 1.05;
      letter-spacing: -0.3px;
    }

    .boot-sub {
      margin: 8px 0 0;
      font-size: 15px;
      color: var(--muted);
    }

    .boot-loader {
      width: 42px;
      height: 42px;
      margin: 18px auto 0;
      border-radius: 50%;
      border: 3px solid #d8ebf4;
      border-top-color: var(--brand-a);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="boot-splash">
    <div class="boot-card">
      <img class="boot-logo" src="https://commitrack.com/bimi.svg" alt="CommiTrack">
      <h1 class="boot-title">CommiTrack</h1>
      <p class="boot-sub">Loading your dashboard...</p>
      <div class="boot-loader" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    window.addEventListener("flutter-first-frame", function () {
      const splash = document.getElementById("boot-splash");
      if (splash) {
        splash.remove();
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
