<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommiTrack | Email Verified</title>
    <style>
      :root {
        --bg-a: #e9f6fc;
        --bg-b: #fdfefe;
        --brand-a: #279fd0;
        --brand-b: #1bb4de;
        --ink: #16303d;
        --muted: #56727f;
        --ok: #12834a;
        --card: #ffffff;
        --line: #d8e7ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 10% -10%, #bde8f9 0, transparent 40%),
          linear-gradient(180deg, var(--bg-a), var(--bg-b));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(500px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 14px 40px rgba(13, 60, 82, 0.15);
        overflow: hidden;
      }

      .head {
        background: linear-gradient(120deg, #0f4f6c, #16779f 58%, #1f95c2);
        color: #fff;
        padding: 18px 24px 16px;
        text-align: center;
      }

      .brand-logo {
        width: 120px;
        height: auto;
        display: block;
        margin: 0 auto 10px;
        padding: 8px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 8px 20px rgba(10, 33, 46, 0.28);
      }

      .head h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      .head p {
        margin: 8px 0 0;
        opacity: 0.95;
        font-size: 18px;
      }

      .content {
        padding: 24px;
      }

      .ok-box {
        border: 1px solid #c9ecd8;
        border-radius: 14px;
        background: #f3fcf7;
        padding: 18px;
        text-align: center;
      }

      .ok-icon {
        font-size: 34px;
        line-height: 1;
        margin: 0 0 8px;
      }

      .ok-title {
        margin: 0 0 8px;
        color: var(--ok);
        font-size: 23px;
        font-weight: 700;
      }

      .ok-title.err {
        color: #b93a2f;
      }

      .ok-text {
        margin: 0;
        color: #2f5f43;
        font-size: 15px;
        line-height: 1.6;
      }

      .ok-text.err {
        color: #7a2b23;
      }

      .actions {
        margin-top: 18px;
      }

      .btn {
        display: inline-block;
        width: 100%;
        text-align: center;
        border: 0;
        border-radius: 999px;
        padding: 13px 18px;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        text-decoration: none;
        background: linear-gradient(120deg, var(--brand-a), var(--brand-b));
      }

      .meta {
        margin-top: 14px;
        color: var(--muted);
        text-align: center;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="head">
        <img class="brand-logo" src="https://commitrack.com/bimi.svg" alt="CommiTrack" />
        <h1 id="title">Email verified</h1>
        <p id="subtitle">Your account is now active.</p>
      </section>

      <section class="content">
        <div class="ok-box" id="statusBox">
          <p class="ok-icon" id="okIcon">⏳</p>
          <h2 class="ok-title" id="okTitle">Verifying...</h2>
          <p class="ok-text" id="okText">Checking secure link.</p>
        </div>

        <div class="actions" id="actions" style="display: none;">
          <a id="cta" href="commitrack://login" class="btn">Open CommiTrack App</a>
        </div>

        <p class="meta" id="meta">If the app does not open, go back and sign in manually.</p>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        getAuth,
        checkActionCode,
        applyActionCode,
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

      const i18n = {
        en: {
          title: "Email verified",
          subtitle: "Your account is now active.",
          okTitle: "Verification successful",
          okText: "You can now return to the app and sign in with your account.",
          cta: "Open CommiTrack App",
          meta: "If the app does not open, go back and sign in manually.",
          verifying: "Verifying your email...",
          invalid: "This verification link is invalid or expired.",
          wrongMode: "This link is not for email verification.",
          genericError: "Unable to verify this email. Request a new verification email.",
          missingCode: "Verification link is incomplete. Request a new verification email.",
          checking: "Checking secure link.",
        },
        es: {
          title: "Correo verificado",
          subtitle: "Tu cuenta ya esta activa.",
          okTitle: "Verificacion exitosa",
          okText: "Ahora puedes volver a la app e iniciar sesion con tu cuenta.",
          cta: "Abrir CommiTrack",
          meta: "Si la app no se abre, vuelve e inicia sesion manualmente.",
          verifying: "Verificando tu correo...",
          invalid: "Este enlace de verificacion no es valido o ya expiro.",
          wrongMode: "Este enlace no es para verificar correo.",
          genericError: "No se pudo verificar el correo. Solicita un nuevo email de verificacion.",
          missingCode: "El enlace de verificacion esta incompleto. Solicita un nuevo email de verificacion.",
          checking: "Validando enlace seguro.",
        },
      };

      const params = new URLSearchParams(window.location.search);
      const qLang = (params.get("lang") || "").toLowerCase();
      const browserLang = (navigator.language || "en").toLowerCase();
      const lang = qLang.startsWith("es") || browserLang.startsWith("es") ? "es" : "en";
      const t = i18n[lang];

      document.documentElement.lang = lang;
      document.getElementById("title").textContent = t.title;
      document.getElementById("subtitle").textContent = t.subtitle;
      document.getElementById("okTitle").textContent = t.verifying;
      document.getElementById("okText").textContent = t.checking;
      document.getElementById("cta").textContent = t.cta;
      document.getElementById("meta").textContent = t.verifying;

      const mode = params.get("mode") || "";
      const oobCode = params.get("oobCode");
      const cfg = {
        apiKey: params.get("apiKey") || "AIzaSyDYmnutGJamhZuu6YoXxg3B8oOKJjJ1Yi4",
        authDomain: "commitrack.firebaseapp.com",
        projectId: "commitrack",
      };
      const app = initializeApp(cfg);
      const auth = getAuth(app);

      function showError(message) {
        const titleEl = document.getElementById("okTitle");
        const textEl = document.getElementById("okText");
        const iconEl = document.getElementById("okIcon");
        titleEl.textContent = lang === "es" ? "Verificacion fallida" : "Verification failed";
        textEl.textContent = message;
        titleEl.classList.add("err");
        textEl.classList.add("err");
        iconEl.textContent = "⚠️";
        document.getElementById("actions").style.display = "none";
        document.getElementById("meta").textContent = "";
      }

      async function run() {
        if (!oobCode) {
          showError(t.missingCode);
          return;
        }
        if (mode && mode !== "verifyEmail") {
          showError(t.wrongMode);
          return;
        }
        document.getElementById("meta").textContent = t.verifying;
        try {
          await checkActionCode(auth, oobCode);
        } catch (_) {
          showError(t.invalid);
          return;
        }
        try {
          await applyActionCode(auth, oobCode);
          document.getElementById("okIcon").textContent = "✅";
          document.getElementById("okTitle").textContent = t.okTitle;
          document.getElementById("okText").textContent = t.okText;
          document.getElementById("actions").style.display = "block";
          document.getElementById("meta").textContent = t.meta;
        } catch (_) {
          showError(t.genericError);
        }
      }

      run();
    </script>
  </body>
</html>
