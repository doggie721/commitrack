<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CommiTrack | Email Verified</title>

  <style>
    body{
      margin:0;
      padding:0;
      background:#f6f8fb;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:#111827;
    }

    .wrapper{
      width:100%;
      padding:40px 15px;
    }

    .container{
      max-width:560px;
      margin:auto;
      background:#ffffff;
      border-radius:14px;
      padding:46px 34px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.06);
    }

    .logo img{
      width:140px;
      height:auto;
      margin-bottom:18px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.12));
    }

    .icon{
      font-size:46px;
      margin:10px 0 14px;
    }

    h1{
      margin:0;
      font-size:26px;
      color:#111827;
      font-weight:650;
      letter-spacing:-0.2px;
    }

    p{
      font-size:16px;
      color:#6b7280;
      line-height:1.6;
      margin:16px 0;
    }

    .btn{
      display:inline-block;
      margin-top:22px;
      padding:14px 28px;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:#fff;
      text-decoration:none;
      font-weight:650;
      border-radius:10px;
      transition:all .25s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(37,99,235,.25);
    }

    .divider{
      height:1px;
      background:#eef2f7;
      margin:34px 0 18px;
    }

    .footer{
      font-size:13px;
      color:#9ca3af;
    }

    .footer a{
      color:#2563eb;
      text-decoration:none;
    }

    @media(max-width:480px){
      .container{ padding:40px 22px; }
      h1{ font-size:22px; }
      .logo img{ width:120px; }
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="container">

      <div class="logo">
        <img src="https://commitrack.com/bimi.svg" alt="CommiTrack Logo" />
      </div>

      <div class="icon">✅</div>

      <h1 id="title">Email Successfully Verified</h1>

      <p id="p1">
        Your email has been confirmed and your <strong>CommiTrack account is now active.</strong>
      </p>

      <p id="p2">
        Return to the app to sign in and start tracking your commissions.
      </p>

      <a id="cta" href="commitrack://login" class="btn">Open CommiTrack App</a>

      <div class="divider"></div>

      <div class="footer">
        <span id="footerText">© 2026 CommiTrack Inc. All rights reserved.</span>
        <span> · </span>
        <a href="https://commitrack.com" id="siteLink">Visit our website</a>
      </div>

    </div>
  </div>

  <script>
    const i18n = {
      en: {
        title: "Email Successfully Verified",
        p1: "Your email has been confirmed and your <strong>CommiTrack account is now active.</strong>",
        p2: "Return to the app to sign in and start tracking your commissions.",
        cta: "Open CommiTrack App",
        footerText: "© 2026 CommiTrack Inc. All rights reserved.",
        siteLink: "Visit our website"
      },
      es: {
        title: "Correo verificado con éxito",
        p1: "Tu correo fue confirmado y tu <strong>cuenta de CommiTrack ya está activa.</strong>",
        p2: "Vuelve a la app para iniciar sesión y comenzar a registrar tus comisiones.",
        cta: "Abrir CommiTrack",
        footerText: "© 2026 CommiTrack Inc. Todos los derechos reservados.",
        siteLink: "Visita nuestro sitio web"
      }
    };

    // lang priority:
    // 1) ?lang=es
    // 2) browser language
    const params = new URLSearchParams(window.location.search);
    const qLang = (params.get("lang") || "").toLowerCase();
    const browserLang = (navigator.language || "en").toLowerCase();
    const lang = (qLang.startsWith("es") || browserLang.startsWith("es")) ? "es" : "en";
    const t = i18n[lang];

    document.documentElement.lang = lang;

    document.getElementById("title").textContent = t.title;
    document.getElementById("p1").innerHTML = t.p1;
    document.getElementById("p2").textContent = t.p2;
    document.getElementById("cta").textContent = t.cta;
    document.getElementById("footerText").textContent = t.footerText;
    document.getElementById("siteLink").textContent = t.siteLink;
  </script>
</body>
</html>
