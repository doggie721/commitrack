<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommiTrack | Email Verified</title>
    <style>
      :root {
        --bg-a: #e9f6fc;
        --bg-b: #fdfefe;
        --brand-a: #279fd0;
        --brand-b: #1bb4de;
        --ink: #16303d;
        --muted: #56727f;
        --ok: #12834a;
        --card: #ffffff;
        --line: #d8e7ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 10% -10%, #bde8f9 0, transparent 40%),
          linear-gradient(180deg, var(--bg-a), var(--bg-b));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(500px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 14px 40px rgba(13, 60, 82, 0.15);
        overflow: hidden;
      }

      .head {
        background: linear-gradient(120deg, #0f4f6c, #16779f 58%, #1f95c2);
        color: #fff;
        padding: 18px 24px 16px;
        text-align: center;
      }

      .brand-logo {
        width: 120px;
        height: auto;
        display: block;
        margin: 0 auto 10px;
        padding: 8px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 8px 20px rgba(10, 33, 46, 0.28);
      }

      .head h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      .head p {
        margin: 8px 0 0;
        opacity: 0.95;
        font-size: 18px;
      }

      .content {
        padding: 24px;
      }

      .ok-box {
        border: 1px solid #c9ecd8;
        border-radius: 14px;
        background: #f3fcf7;
        padding: 18px;
        text-align: center;
      }

      .ok-icon {
        font-size: 34px;
        line-height: 1;
        margin: 0 0 8px;
      }

      .ok-title {
        margin: 0 0 8px;
        color: var(--ok);
        font-size: 23px;
        font-weight: 700;
      }

      .ok-text {
        margin: 0;
        color: #2f5f43;
        font-size: 15px;
        line-height: 1.6;
      }

      .actions {
        margin-top: 18px;
      }

      .btn {
        display: inline-block;
        width: 100%;
        text-align: center;
        border: 0;
        border-radius: 999px;
        padding: 13px 18px;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        text-decoration: none;
        background: linear-gradient(120deg, var(--brand-a), var(--brand-b));
      }

      .meta {
        margin-top: 14px;
        color: var(--muted);
        text-align: center;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="head">
        <img class="brand-logo" src="https://commitrack.com/bimi.svg" alt="CommiTrack" />
        <h1 id="title">Email verified</h1>
        <p id="subtitle">Your account is now active.</p>
      </section>

      <section class="content">
        <div class="ok-box">
          <p class="ok-icon">✅</p>
          <h2 class="ok-title" id="okTitle">Verification successful</h2>
          <p class="ok-text" id="okText">
            You can now return to the app and sign in with your account.
          </p>
        </div>

        <div class="actions">
          <a id="cta" href="commitrack://login" class="btn">Open CommiTrack App</a>
        </div>

        <p class="meta" id="meta">If the app does not open, go back and sign in manually.</p>
      </section>
    </main>

    <script>
      const i18n = {
        en: {
          title: "Email verified",
          subtitle: "Your account is now active.",
          okTitle: "Verification successful",
          okText: "You can now return to the app and sign in with your account.",
          cta: "Open CommiTrack App",
          meta: "If the app does not open, go back and sign in manually.",
        },
        es: {
          title: "Correo verificado",
          subtitle: "Tu cuenta ya esta activa.",
          okTitle: "Verificacion exitosa",
          okText: "Ahora puedes volver a la app e iniciar sesion con tu cuenta.",
          cta: "Abrir CommiTrack",
          meta: "Si la app no se abre, vuelve e inicia sesion manualmente.",
        },
      };

      const params = new URLSearchParams(window.location.search);
      const qLang = (params.get("lang") || "").toLowerCase();
      const browserLang = (navigator.language || "en").toLowerCase();
      const lang = qLang.startsWith("es") || browserLang.startsWith("es") ? "es" : "en";
      const t = i18n[lang];

      document.documentElement.lang = lang;
      document.getElementById("title").textContent = t.title;
      document.getElementById("subtitle").textContent = t.subtitle;
      document.getElementById("okTitle").textContent = t.okTitle;
      document.getElementById("okText").textContent = t.okText;
      document.getElementById("cta").textContent = t.cta;
      document.getElementById("meta").textContent = t.meta;
    </script>
  </body>
</html>
