<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Email Verified • CommiTrack</title>

<style>

body{
  margin:0;
  padding:0;
  background:#f6f8fb;
  font-family:-apple-system,BlinkMacSystemFont,
  "Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

.wrapper{
  width:100%;
  padding:40px 15px;
}

.container{
  max-width:560px;
  margin:auto;
  background:#ffffff;
  border-radius:14px;
  padding:50px 35px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.06);
}

/* ✅ LOGO */
.logo img{
  width:140px;
  height:auto;
  margin-bottom:30px;
}

/* Success icon */
.icon{
  font-size:48px;
  margin-bottom:20px;
}

h1{
  margin:0;
  font-size:26px;
  color:#111827;
  font-weight:600;
}

p{
  font-size:16px;
  color:#6b7280;
  line-height:1.6;
  margin:18px 0;
}

.btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 28px;
  background:linear-gradient(
      135deg,
      #2563eb,
      #1d4ed8
  );
  color:#fff;
  text-decoration:none;
  font-weight:600;
  border-radius:8px;
  transition:all .25s ease;
}

.btn:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 18px rgba(37,99,235,.25);
}

.divider{
  height:1px;
  background:#eee;
  margin:35px 0;
}

.footer{
  font-size:13px;
  color:#9ca3af;
}

.footer a{
  color:#2563eb;
  text-decoration:none;
}

@media(max-width:480px){
  .container{
    padding:40px 22px;
  }

  h1{
    font-size:22px;
  }

  .logo img{
    width:120px;
  }
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="container">

    <!-- ✅ Official Logo -->
    <div class="logo">
      <img src="https://commitrack.com/bimi.svg"
           alt="CommiTrack Logo">
    </div>

    <div class="icon">🎉</div>

    <h1>Email Successfully Verified</h1>

    <p>
      Your email has been confirmed and your
      <strong>CommiTrack account is now active.</strong>
    </p>

    <p>
      Return to the app and start tracking your
      commissions with clarity and confidence.
    </p>

    <a href="commitrack://login" class="btn">
      Open CommiTrack App
    </a>

    <div class="divider"></div>

    <div class="footer">
      © 2026 CommiTrack Inc.<br>
      <a href="https://commitrack.com">
        www.commitrack.com
      </a>
    </div>

  </div>

</div>

</body>
</html>

</body>
</html>
