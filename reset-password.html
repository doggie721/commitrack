<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommiTrack | Reset Password</title>
    <style>
      :root {
        --bg-a: #e9f6fc;
        --bg-b: #fdfefe;
        --brand-a: #279fd0;
        --brand-b: #1bb4de;
        --ink: #16303d;
        --muted: #56727f;
        --ok: #12834a;
        --warn: #b93a2f;
        --card: #ffffff;
        --line: #d8e7ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 10% -10%, #bde8f9 0, transparent 40%),
          linear-gradient(180deg, var(--bg-a), var(--bg-b));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(460px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 14px 40px rgba(13, 60, 82, 0.15);
        overflow: hidden;
      }

      .head {
        background: linear-gradient(120deg, #0f4f6c, #16779f 58%, #1f95c2);
        color: #fff;
        padding: 18px 24px 16px;
        text-align: center;
      }

      .brand-logo {
        width: 120px;
        height: auto;
        display: block;
        margin: 0 auto 10px;
        padding: 8px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 8px 20px rgba(10, 33, 46, 0.28);
      }

      .head h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      .head p {
        margin: 8px 0 0;
        opacity: 0.95;
      }

      .content {
        padding: 24px;
      }

      .email {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14px;
      }

      label {
        display: block;
        margin: 10px 0 6px;
        font-weight: 600;
      }

      input {
        width: 100%;
        border: 1px solid #c8dce7;
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 16px;
        outline: none;
      }

      input:focus {
        border-color: var(--brand-a);
        box-shadow: 0 0 0 3px rgba(39, 159, 208, 0.17);
      }

      .hint {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        margin-top: 18px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 13px 18px;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        background: linear-gradient(120deg, var(--brand-a), var(--brand-b));
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 14px;
        font-size: 14px;
        min-height: 20px;
      }

      .ok {
        color: var(--ok);
      }

      .err {
        color: var(--warn);
      }

      .success-box {
        display: none;
        margin-top: 8px;
        padding: 18px;
        border: 1px solid #c9ecd8;
        border-radius: 14px;
        background: #f3fcf7;
        text-align: center;
      }

      .success-box h3 {
        margin: 0 0 8px;
        color: var(--ok);
        font-size: 20px;
      }

      .success-box p {
        margin: 0;
        color: #2f5f43;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="head">
        <img class="brand-logo" src="https://commitrack.com/bimi.svg" alt="CommiTrack" />
        <h1 id="title">Reset your password</h1>
        <p id="subtitle">Choose a strong password to continue.</p>
      </section>
      <section class="content">
        <div id="formBox">
          <p class="email" id="emailLine"></p>
          <label id="labelPwd" for="pwd">New password</label>
          <input id="pwd" type="password" autocomplete="new-password" />
          <label id="labelPwd2" for="pwd2">Confirm password</label>
          <input id="pwd2" type="password" autocomplete="new-password" />
          <p class="hint" id="hint">Use at least 8 characters.</p>
          <div class="actions">
            <button id="btn">Update password</button>
          </div>
        </div>

        <div class="success-box" id="successBox">
          <h3 id="successTitle">Password changed successfully</h3>
          <p id="successText">You can now return to the app and sign in.</p>
        </div>

        <p class="status" id="status"></p>
      </section>
    </main>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
      import {
        getAuth,
        verifyPasswordResetCode,
        confirmPasswordReset,
      } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

      const i18n = {
        en: {
          title: "Reset your password",
          subtitle: "Choose a strong password to continue.",
          newPwd: "New password",
          confirmPwd: "Confirm password",
          hint: "Use at least 8 characters.",
          btn: "Update password",
          invalidLink: "This reset link is invalid or expired.",
          mismatch: "Passwords do not match.",
          tooShort: "Password must have at least 8 characters.",
          working: "Updating password...",
          success: "Password updated. You can now return to the app and sign in.",
          successTitle: "Password changed successfully",
          unknown: "Unable to reset password. Please request a new reset email.",
        },
        es: {
          title: "Restablece tu contrasena",
          subtitle: "Elige una contrasena segura para continuar.",
          newPwd: "Nueva contrasena",
          confirmPwd: "Confirmar contrasena",
          hint: "Usa al menos 8 caracteres.",
          btn: "Actualizar contrasena",
          invalidLink: "Este enlace no es valido o ya expiro.",
          mismatch: "Las contrasenas no coinciden.",
          tooShort: "La contrasena debe tener al menos 8 caracteres.",
          working: "Actualizando contrasena...",
          success: "Contrasena actualizada. Ya puedes volver a la app e iniciar sesion.",
          successTitle: "Contrasena cambiada exitosamente",
          unknown: "No se pudo restablecer la contrasena. Solicita un nuevo correo.",
        },
      };

      const params = new URLSearchParams(window.location.search);
      const oobCode = params.get("oobCode");
      const lang = (params.get("lang") || "en").toLowerCase().startsWith("es")
        ? "es"
        : "en";
      const t = i18n[lang];

      const cfg = {
        apiKey: "AIzaSyDYmnutGJamhZuu6YoXxg3B8oOKJjJ1Yi4",
        authDomain: "commitrack.firebaseapp.com",
        projectId: "commitrack",
      };

      const app = initializeApp(cfg);
      const auth = getAuth(app);

      const el = {
        title: document.getElementById("title"),
        subtitle: document.getElementById("subtitle"),
        emailLine: document.getElementById("emailLine"),
        labelPwd: document.getElementById("labelPwd"),
        labelPwd2: document.getElementById("labelPwd2"),
        hint: document.getElementById("hint"),
        btn: document.getElementById("btn"),
        pwd: document.getElementById("pwd"),
        pwd2: document.getElementById("pwd2"),
        status: document.getElementById("status"),
        formBox: document.getElementById("formBox"),
        successBox: document.getElementById("successBox"),
        successTitle: document.getElementById("successTitle"),
        successText: document.getElementById("successText"),
      };

      function setText() {
        el.title.textContent = t.title;
        el.subtitle.textContent = t.subtitle;
        el.labelPwd.textContent = t.newPwd;
        el.labelPwd2.textContent = t.confirmPwd;
        el.hint.textContent = t.hint;
        el.btn.textContent = t.btn;
        el.successTitle.textContent = t.successTitle;
        el.successText.textContent = t.success;
      }

      function setStatus(msg, ok = false) {
        el.status.textContent = msg;
        el.status.className = `status ${ok ? "ok" : "err"}`;
      }

      setText();

      if (!oobCode) {
        setStatus(t.invalidLink);
        el.formBox.style.display = "none";
      } else {
        try {
          const email = await verifyPasswordResetCode(auth, oobCode);
          el.emailLine.textContent = email;
        } catch (_) {
          setStatus(t.invalidLink);
          el.formBox.style.display = "none";
        }
      }

      el.btn.addEventListener("click", async () => {
        const pwd = el.pwd.value.trim();
        const pwd2 = el.pwd2.value.trim();

        if (pwd.length < 8) {
          setStatus(t.tooShort);
          return;
        }
        if (pwd !== pwd2) {
          setStatus(t.mismatch);
          return;
        }

        try {
          el.btn.disabled = true;
          setStatus(t.working);
          await confirmPasswordReset(auth, oobCode, pwd);
          el.formBox.style.display = "none";
          el.status.textContent = "";
          el.successBox.style.display = "block";
        } catch (_) {
          setStatus(t.unknown);
          el.btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
